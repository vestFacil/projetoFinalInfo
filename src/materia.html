<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Questões</title>
    <link rel="stylesheet" href="css/materia.css">
</head>
<body>

    <div class="topo">
        <p>Questões</p>
    </div>

    <div class="corpo">

        <p>Explore uma ampla coleção de questões para treinar e testar seus conhecimentos.</p>

        <input type="text" placeholder="Pesquisar por matéria...">

        <div class="materias">

            <button class="btn-materia" data-materia="matematica">Matemática</button>
            <button class="btn-materia" data-materia="portugues">Português</button>
            <button class="btn-materia" data-materia="historia">História</button>
            <button class="btn-materia" data-materia="geografia">Geografia</button>
            <button class="btn-materia" data-materia="biologia">Biologia</button>
            <button class="btn-materia" data-materia="quimica">Química</button>
            <button class="btn-materia" data-materia="fisica">Física</button>
            <button class="btn-materia" data-materia="ingles">Inglês</button>
            <button class="btn-materia" data-materia="espanhol">Espanhol</button>
            <button class="btn-materia" data-materia="filosofia">Filosofia</button>
            <button class="btn-materia" data-materia="sociologia">Sociologia</button>
            <button class="btn-materia" data-materia="artes">Artes</button>
            <button class="btn-materia" data-materia="educacao_fisica">Educação Física</button>

        </div>

    </div>

    <section class="conteudo">

        <h2 id="tituloMateria">
            
        </h2>

        <div id="listaConteudos">
            <!-- O JavaScript vai colocar os conteúdos aqui -->
        </div>

    </section>

    <script src="js/materia.js"></script>

</body>
</html>
