<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Questões</title>
    <link rel="stylesheet" href="css/questao.css">
</head>
<body>

    <!-- Popup -->
    <div id="popupConfiguracao" class="popup">

        <div class="popup-conteudo">

            <div class="titulo">
                <h1>Configuração da Lista</h1>
            </div>

            <select id="quantidade">
                <option value="5">5 questões</option>
                <option value="10">10 questões</option>
                <option value="20">20 questões</option>
            </select>

            <button id="iniciar">
                Começar
            </button>

        </div>

    </div>

    <!-- Questões -->
    <div id="questao">

        <p id="contador"></p>

        <h1 id="titulo"></h1>

        <p id="enunciado"></p>

        <div id="alternativas"></div>

        <button id="responder">
            Responder
        </button>

        <p id="resultado"></p>

        <button id="proxima">
            Próxima Questão
        </button>

    </div>

    <script src="js/questao.js"></script>

</body>
</html>
